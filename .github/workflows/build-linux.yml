name: Build Linux binary

on:
  workflow_dispatch: {}
  push:
    branches:
      - master
      - undo/redo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Install system build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgl1-mesa-dev xorg-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libx11-dev pkg-config

      - name: Build mosugo (linux/amd64)
        env:
          CGO_ENABLED: '1'
          GOOS: linux
          GOARCH: amd64
        run: |
          mkdir -p dist
          go build -v -o dist/mosugo-linux-amd64 ./cmd/mosugo

      - name: Show binary info
        run: |
          ls -lh dist || true
          file dist/mosugo-linux-amd64 || true

      - name: Package artifact
        run: |
          cd dist
          zip -r ../mosugo-linux-amd64.zip mosugo-linux-amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mosugo-linux-amd64
          path: mosugo-linux-amd64.zip
